<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paste to Markdown</title>
  <meta name="description" content="Paste rich text from Notion, Google Docs, Airtable. Get clean Markdown, auto-copied to your clipboard.">
  <link rel="icon" type="image/png" href="paperclip.png">
  <link rel="preload" href="fonts/InterVariable.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/iAWriterMonoS-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    /* Fonts (OFL) — see fonts/LICENSE.md */
    @font-face {
      font-family: 'Inter';
      src: url('fonts/InterVariable.woff2') format('woff2-variations');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'iA Writer Mono';
      src: url('fonts/iAWriterMonoS-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'iA Writer Mono';
      src: url('fonts/iAWriterMonoS-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --paper:        #F7F7F7;
      --card:         #FFFFFF;
      --rule:         #EAEAEA;
      --rule-soft:    #F0F0F0;
      --ink:          #222222;
      --ink-muted:    #555555;
      --ink-subtle:   #888888;
      --accent:       #0080FF;
      --accent-label: #00A3FF;
      --accent-bg:    #E8F2FF;
      --accent-ring:  rgba(0, 128, 255, 0.18);

      --shadow-card:
        0 1px 2px rgba(0, 0, 0, 0.04),
        0 4px 12px rgba(0, 0, 0, 0.04),
        0 12px 32px rgba(0, 0, 0, 0.04);

      --r-sm: 6px;
      --r-md: 8px;
      --r-pill: 999px;

      --font-sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'iA Writer Mono', ui-monospace, 'SF Mono', Menlo, Monaco, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 450;
      line-height: 1.55;
      color: var(--ink);
      background: var(--paper);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 24px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    .page-header {
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--accent-label);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .page-header h1 {
      font-family: var(--font-sans);
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.4px;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--ink-muted);
      line-height: 1.55;
      max-width: 52ch;
    }

    /* Two-column workspace */
    .container {
      display: flex;
      gap: 24px;
      flex: 1;
      min-height: 0;
    }

    .box {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 22px;
      margin-bottom: 12px;
    }

    .section-label {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--accent-label);
      text-transform: uppercase;
    }

    .copy-flash {
      display: inline-block;
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 2px 10px;
      background: var(--accent-bg);
      color: var(--accent);
      border-radius: var(--r-pill);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    /* Card chrome shared by both panes */
    .card {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-card);
      flex: 1;
      display: flex;
      min-height: 0;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .card:focus-within {
      border-color: var(--accent);
      box-shadow: var(--shadow-card), 0 0 0 3px var(--accent-ring);
    }

    /* Input pane — sans-serif, since pasted rich text is normally prose */
    .ql-editor {
      flex: 1;
      width: 100%;
      min-height: 0;
      padding: 18px 20px;
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      color: var(--ink);
      background: transparent;
      caret-color: var(--accent);
      overflow-y: auto;
      outline: none;
    }

    .ql-editor:empty::before {
      content: 'Paste here…';
      color: var(--ink-subtle);
      pointer-events: none;
    }

    /* Output pane — iA Writer Mono, the writing surface */
    .output-content {
      flex: 1;
      width: 100%;
      min-height: 0;
      padding: 18px 20px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.7;
      color: var(--ink);
      background: transparent;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-y: auto;
    }

    .output-content:empty::before {
      content: 'Markdown will appear here.';
      color: var(--ink-subtle);
      font-family: var(--font-sans);
      font-size: 13px;
    }

    /* Footer */
    .page-footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--rule);
      font-size: 12px;
      color: var(--ink-subtle);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .page-footer a {
      color: var(--ink-muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .page-footer a:hover {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .page-footer .dot {
      color: var(--ink-subtle);
    }

    /* Responsive — single column on narrow viewports */
    @media (max-width: 720px) {
      .page {
        padding: 24px 18px 18px;
      }

      .page-header {
        margin-bottom: 18px;
      }

      .page-header h1 {
        font-size: 24px;
      }

      .subtitle {
        font-size: 14px;
      }

      .container {
        flex-direction: column;
        gap: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="page-header">
      <div class="eyebrow">Paste to Markdown</div>
      <h1>Rich text in. Clean Markdown out.</h1>
      <p class="subtitle">Paste anywhere on the left. Markdown is auto-copied to your clipboard.</p>
    </header>

    <div class="container">
      <section class="box input-box">
        <div class="section-header">
          <h3 class="section-label">Input</h3>
        </div>
        <div class="card">
          <div class="ql-editor" contenteditable="true"></div>
        </div>
      </section>

      <section class="box output-box">
        <div class="section-header">
          <h3 class="section-label">Markdown output</h3>
          <span id="pastedNotification" class="copy-flash">Copied</span>
        </div>
        <div class="card">
          <pre id="output" class="output-content"></pre>
        </div>
      </section>
    </div>

    <footer class="page-footer">
      <a href="https://github.com/dewierwan/paste-to-markdown">GitHub</a>
      <span class="dot">·</span>
      <a href="https://support.google.com/docs/answer/12014036">Google Docs paste tips</a>
    </footer>
  </main>

  <script>
    // Convert the entire HTML content into Markdown.
    function convertToMarkdown(htmlContent) {
      const tempDiv = document.createElement("div");
      tempDiv.innerHTML = htmlContent;
      return convertNodeToMarkdown(tempDiv).trim();
    }

    // Recursively convert a node to Markdown.
    function convertNodeToMarkdown(node, indentLevel = 0, listIndex = null) {
      let markdown = "";
      if (node.nodeType === Node.TEXT_NODE) {
        return node.textContent;
      } else if (node.nodeType === Node.ELEMENT_NODE) {
        const tag = node.tagName.toLowerCase();
        switch (tag) {
          case 'h1':
            return "# " + getInnerMarkdown(node, indentLevel) + "\n\n";
          case 'h2':
            return "## " + getInnerMarkdown(node, indentLevel) + "\n\n";
          case 'h3':
            return "### " + getInnerMarkdown(node, indentLevel) + "\n\n";
          case 'strong':
          case 'b':
            return "**" + getInnerMarkdown(node, indentLevel) + "**";
          case 'em':
          case 'i': {
            let text = getInnerMarkdown(node, indentLevel);
            let trailingSpaces = '';
            let mainText = text;
            let match = text.match(/(\s+)$/);
            if (match) {
              trailingSpaces = match[1];
              mainText = text.slice(0, -trailingSpaces.length);
            }
            return "*" + mainText + "*" + trailingSpaces;
          }
          case 's':
          case 'strike':
            return "~~" + getInnerMarkdown(node, indentLevel) + "~~";
          case 'code':
            return "`" + node.textContent + "`";
          case 'pre':
            return "```\n" + node.textContent + "\n```\n\n";
          case 'blockquote': {
            const blockquoteContent = getInnerMarkdown(node, indentLevel);
            return blockquoteContent.split('\n')
              .map(line => line.trim() ? "> " + line : line)
              .join('\n') + "\n\n";
          }
          case 'ul': {
            let ulMarkdown = "";
            Array.from(node.children).forEach(child => {
              if (child.tagName.toLowerCase() === 'li') {
                ulMarkdown += convertNodeToMarkdown(child, indentLevel);
              }
            });
            return ulMarkdown;
          }
          case 'ol': {
            let olMarkdown = "\n";
            let counter = 1;
            Array.from(node.children).forEach(child => {
              if (child.tagName.toLowerCase() === 'li') {
                olMarkdown += convertNodeToMarkdown(child, indentLevel, counter);
                counter++;
              }
            });
            return olMarkdown + "\n";
          }
          case 'li': {
            let indent = indentLevel;
            node.classList.forEach(cls => {
              if (cls.indexOf("ql-indent-") === 0) {
                const level = parseInt(cls.substring(10));
                if (!isNaN(level)) {
                  indent = level;
                }
              }
            });
            let prefix = "";
            if (node.parentElement && node.parentElement.tagName.toLowerCase() === 'ul' && node.parentElement.hasAttribute("data-checked")) {
              let isChecked = node.parentElement.getAttribute("data-checked") === "true";
              prefix = "  ".repeat(indent) + (isChecked ? "- [x] " : "- [ ] ");
            } else {
              // Check for checkbox inside the list item.
              let checkbox = node.querySelector('input[type="checkbox"]');
              if (checkbox) {
                prefix = "  ".repeat(indent) + (checkbox.checked ? "- [x] " : "- [ ] ");
                checkbox.remove();
              } else if (node.parentElement && node.parentElement.tagName.toLowerCase() === 'ol') {
                prefix = "  ".repeat(indent) + (listIndex !== null ? listIndex + ". " : "1. ");
              } else {
                prefix = "  ".repeat(indent) + "- ";
              }
            }
            let liContent = getInnerMarkdown(node, indent);
            return prefix + liContent.trim() + "\n";
          }
          case 'a': {
            const href = node.getAttribute("href") || "";
            return "[" + getInnerMarkdown(node, indentLevel) + "](" + href + ")";
          }
          case 'br':
            return "\n";
          case 'p':
            return getInnerMarkdown(node, indentLevel) + "\n\n";
          case 'span': {
            let text = getInnerMarkdown(node, indentLevel);
            // Check classes for formatting
            let isBold = node.classList.contains("ql-bold");
            let isItalic = node.classList.contains("ql-italic");
            // Also check inline style if classes are not present.
            if (!isBold && node.style && node.style.fontWeight) {
              const weight = node.style.fontWeight;
              if (weight === "bold" || parseInt(weight) >= 600) {
                isBold = true;
              }
            }
            if (!isItalic && node.style && node.style.fontStyle) {
              const style = node.style.fontStyle;
              if (style === "italic") {
                isItalic = true;
              }
            }
            let trailingSpaces = '';
            let mainText = text;
            let match = text.match(/(\s+)$/);
            if (match) {
              trailingSpaces = match[1];
              mainText = text.slice(0, -trailingSpaces.length);
            }
            if (isBold && isItalic) {
              return "***" + mainText + "***" + trailingSpaces;
            } else if (isBold) {
              return "**" + mainText + "**" + trailingSpaces;
            } else if (isItalic) {
              return "*" + mainText + "*" + trailingSpaces;
            }
            return text;
          }
          default:
            return getInnerMarkdown(node, indentLevel);
        }
      }
      return "";
    }

    // Process all child nodes of a given node.
    function getInnerMarkdown(node, indentLevel) {
      let result = "";
      node.childNodes.forEach(child => {
        result += convertNodeToMarkdown(child, indentLevel);
      });
      return result;
    }

    // DOM Elements
    const inputEditor = document.querySelector('.input-box .ql-editor');
    const outputElement = document.getElementById('output');

    // Update Markdown output, copy to clipboard, and clear input.
    function updateMarkdown() {
      const htmlContent = inputEditor.innerHTML;
      // Only process if there's actual content
      if (htmlContent.trim() === "") return;

      try {
        const markdown = convertToMarkdown(htmlContent);
        outputElement.textContent = markdown;

        // Automatically copy to clipboard and show notification
        navigator.clipboard.writeText(markdown).then(() => {
          const notification = document.getElementById('pastedNotification');
          notification.style.opacity = '1';
          setTimeout(() => {
            notification.style.opacity = '0';
          }, 3000);

          // Clear the input after successful conversion and copying
          setTimeout(() => {
            inputEditor.innerHTML = "";
          }, 500);
        }).catch(err => {
          console.error("Could not copy text: ", err);
        });
      } catch (e) {
        console.error("Error converting content: ", e);
        outputElement.textContent = "Error converting content.";
      }
    }

    // Listen for paste event on the input.
    inputEditor.addEventListener('paste', function(e) {
      // Give the paste event time to complete before processing
      setTimeout(updateMarkdown, 100);
    });
  </script>
</body>
</html>
